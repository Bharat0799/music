<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape s1" aria-hidden="true"></div>
  <div class="bg-shape s2" aria-hidden="true"></div>
  <div class="bg-shape s3" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="player-card" id="playerCard" aria-label="Music Player">
      <div class="top-row">
        <p class="eyebrow">AURORA PLAYER</p>
        <button id="themeToggle" type="button" class="glass-btn small">Pastel Mode</button>
      </div>

      <div class="cover-stage">
        <img id="coverImage" src="" alt="Album cover" />
      </div>

      <h1 id="songTitle">Loading...</h1>
      <p id="songArtist">Artist</p>

      <audio id="audio" crossorigin="anonymous"></audio>
      <canvas id="visualizer" width="700" height="110" aria-label="Audio visualizer"></canvas>

      <div class="progress-wrap">
        <input id="progressBar" type="range" min="0" max="100" value="0" step="0.1" />
        <div class="time-row">
          <span id="currentTime">00:00</span>
          <span id="duration">00:00</span>
        </div>
      </div>

      <div class="controls">
        <button id="prevBtn" type="button" class="glass-btn control">&#9198;</button>
        <button id="playBtn" type="button" class="glass-btn control play">&#9654;</button>
        <button id="nextBtn" type="button" class="glass-btn control">&#9197;</button>
      </div>

      <div class="volume-wrap">
        <label for="volumeBar">Volume</label>
        <input id="volumeBar" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </section>

    <aside class="playlist-card">
      <div class="playlist-head">
        <h2>Playlist</h2>
        <span id="trackCount">0 tracks</span>
      </div>

      <div id="dropZone" class="drop-zone" tabindex="0">
        Drop MP3 files here or <label for="fileInput" class="upload-link">browse</label>
      </div>
      <input id="fileInput" type="file" accept="audio/mpeg,audio/mp3" multiple />

      <ul id="playlist"></ul>
      <p id="playlistEmpty" class="hidden">No tracks yet.</p>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
